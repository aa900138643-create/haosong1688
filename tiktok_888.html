<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVIP 後台管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { background-color: #111; color: #fff; font-family: 'Segoe UI', sans-serif; }
        [v-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#111] text-white min-h-screen pb-20">

    <div id="app" v-cloak>
        <header class="fixed top-0 w-full z-40 bg-black/80 backdrop-blur-md border-b border-gray-800 p-4 flex justify-center items-center h-16">
            <h1 class="text-xl font-bold text-red-500 tracking-widest">後台管理模式</h1>
        </header>

        <main class="pt-24 px-4 max-w-2xl mx-auto">
            
            <div v-if="!user" class="py-10 text-center space-y-4 bg-[#1a1a1a] p-6 rounded-xl border border-gray-700 shadow-2xl max-w-md mx-auto">
                <h2 class="text-2xl font-bold text-white mb-6">管理員登入</h2>
                <input v-model="loginForm.email" type="email" class="w-full bg-black border border-gray-700 rounded p-3 text-white" placeholder="Email">
                <input v-model="loginForm.password" type="password" class="w-full bg-black border border-gray-700 rounded p-3 text-white" placeholder="密碼">
                <div class="flex gap-2">
                    <input v-model="loginForm.captcha" type="text" class="w-1/2 bg-black border border-gray-700 rounded p-3 text-white uppercase" placeholder="驗證碼">
                    <canvas id="captchaCanvas" width="120" height="50" class="bg-gray-800 rounded cursor-pointer border border-gray-600 hover:border-yellow-500" @click="generateCaptcha"></canvas>
                </div>
                <button @click="login" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded transition mt-4">登入系統</button>
            </div>

            <div v-else class="space-y-6">
                <div class="flex justify-between items-center bg-gray-900/50 p-4 rounded-xl border border-gray-800">
                    <h2 class="text-xl font-bold text-white tracking-wide">歡迎回來 大帥哥老闆</h2>
                    <button @click="logout" class="text-xs text-red-400 border border-red-900/50 px-4 py-2 rounded-lg hover:bg-red-900/30 transition">登出</button>
                </div>

                <div class="flex bg-[#1a1a1a] p-1 rounded-xl border border-gray-800">
                    <button @click="adminTab = 'product'" 
                        :class="adminTab === 'product' ? 'bg-gray-800 text-yellow-500 shadow-md' : 'text-gray-500 hover:text-gray-300'" 
                        class="py-3 px-4 font-bold transition-all flex-1 rounded-lg flex items-center justify-center gap-2">
                        <i class="fas fa-box"></i> 商品管理
                    </button>
                    <button @click="adminTab = 'layout'" 
                        :class="adminTab === 'layout' ? 'bg-gray-800 text-yellow-500 shadow-md' : 'text-gray-500 hover:text-gray-300'" 
                        class="py-3 px-4 font-bold transition-all flex-1 rounded-lg flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> 網站佈置
                    </button>
                </div>

                <div v-if="adminTab === 'product'" class="space-y-6 animate-fadeIn">
                    <div class="bg-[#1a1a1a] p-6 rounded-xl border border-gray-800 shadow-xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-lg font-bold text-white">{{ isEditing ? '✏️ 編輯商品' : '➕ 新增商品' }}</h3>
                            <button v-if="isEditing" @click="cancelEdit" class="text-xs bg-gray-700 px-3 py-1.5 rounded-lg">取消編輯</button>
                        </div>

                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <label class="flex items-center justify-center gap-2 bg-black/40 border border-gray-700 p-3 rounded-lg cursor-pointer">
                                    <input v-model="form.isTop" type="checkbox" class="accent-red-500">
                                    <span class="text-sm font-bold text-red-400">熱門置頂</span>
                                </label>
                                <label class="flex items-center justify-center gap-2 bg-black/40 border border-gray-700 p-3 rounded-lg cursor-pointer">
                                    <input v-model="form.isFull" type="checkbox" class="accent-orange-500">
                                    <span class="text-sm font-bold text-orange-400">今日已滿</span>
                                </label>
                            </div>

                            <input v-model="form.name" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white focus:border-yellow-500 outline-none" placeholder="名字">
                            
                            <div class="grid grid-cols-2 gap-3">
                                <select v-model="form.city" @change="form.district = ''" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-yellow-500 outline-none">
                                    <option value="">選擇縣市</option>
                                    <option v-for="(districts, city) in locations" :key="city" :value="city">{{ city }}</option>
                                </select>
                                <select v-model="form.district" :disabled="!form.city" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-sm text-white focus:border-yellow-500 outline-none disabled:opacity-50">
                                    <option value="">選擇鄉鎮區</option>
                                    <option v-for="d in (locations[form.city] || [])" :key="d" :value="d">{{ d }}</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <input v-model="form.price" type="number" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white focus:border-yellow-500 outline-none" placeholder="價格">
                                <input v-model="form.tags" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white focus:border-yellow-500 outline-none" placeholder="標籤">
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <input v-model="form.height" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white text-center" placeholder="身高">
                                <input v-model="form.weight" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white text-center" placeholder="體重">
                                <input v-model="form.cup" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white text-center" placeholder="罩杯">
                            </div>

                            <textarea v-model="form.imagesText" rows="3" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-xs text-green-400 font-mono" placeholder="圖片連結 (一行一張)"></textarea>
                            <textarea v-model="form.details" rows="3" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white text-sm" placeholder="詳細介紹"></textarea>
                            
                            <button @click="saveProduct" :class="isEditing ? 'bg-green-600 hover:bg-green-500' : 'bg-blue-600 hover:bg-blue-500'" class="w-full text-white font-bold py-4 rounded-xl transition shadow-lg">
                                {{ isEditing ? '儲存修改' : '新增商品' }}
                            </button>
                        </div>
                    </div>

                    <div class="space-y-2 max-h-[500px] overflow-y-auto pr-2 hide-scrollbar">
                        <div v-for="p in products" :key="p.id" class="flex justify-between items-center bg-[#1a1a1a] p-3 rounded-xl border border-gray-800 hover:border-gray-700 transition" :class="{'border-l-4 border-l-red-500': p.isTop, 'opacity-60': p.isFull}">
                            <div class="flex items-center gap-3">
                                <img :src="ensureArray(p.images)[0]" class="w-10 h-10 rounded-lg object-cover">
                                <div class="flex flex-col">
                                    <span class="text-sm font-bold">{{ p.name }}</span>
                                    <span class="text-[10px] text-gray-500">{{ p.city }} {{ p.district }}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button @click="openEdit(p)" class="text-xs bg-gray-800 text-yellow-500 px-3 py-1.5 rounded-lg border border-gray-700 hover:bg-gray-700 transition">編輯</button>
                                <button @click="deleteProduct(p.id)" class="text-xs bg-red-900/20 text-red-400 px-3 py-1.5 rounded-lg border border-red-900/30 hover:bg-red-900/40 transition">刪除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div v-if="adminTab === 'layout'" class="space-y-4 animate-fadeIn">
                    <div class="bg-[#1a1a1a] p-6 rounded-xl border border-gray-800 shadow-xl space-y-6">
                        
                        <div>
                            <label class="block text-xs font-bold text-yellow-500 mb-2">📢 跑馬燈公告</label>
                            <input v-model="layoutForm.announcement" type="text" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white text-sm outline-none focus:border-yellow-500">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-blue-400 mb-2">📍 地區選單設定 (簡單清單模式)</label>
                            <div class="bg-blue-900/20 p-3 rounded-lg border border-blue-900/30 mb-2">
                                <p class="text-[10px] text-blue-300">格式：<strong class="text-white">縣市-區域</strong> (每一行一組)</p>
                                <p class="text-[10px] text-blue-400">例如：<br>雲林縣-麥寮<br>雲林縣-虎尾<br>台中市-清水區</p>
                            </div>
                            <textarea v-model="layoutForm.locationsSimple" rows="8" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-sm text-white font-mono outline-none focus:border-blue-500 transition" placeholder="縣市-區域"></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-green-500 mb-2">🖼️ 首頁大圖輪播</label>
                            <textarea v-model="layoutForm.bannersText" rows="6" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-xs text-green-400 font-mono outline-none focus:border-green-500 transition" placeholder="圖片網址 (一行一個)"></textarea>
                        </div>
                        
                        <button @click="saveLayoutSettings" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                            儲存所有佈置設定
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { createApp, ref, onMounted, nextTick } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyqNcAlOlTsbwUVgpZSNr4q5hYkvq-eQQ",
            authDomain: "haosongjkf.firebaseapp.com",
            projectId: "haosongjkf",
            storageBucket: "haosongjkf.firebasestorage.app",
            messagingSenderId: "126135414816",
            appId: "1:126135414816:web:84781ef106189ec5f5cc45",
            measurementId: "G-PKYPK679KL"
        };

        createApp({
            setup() {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app); 
                const products = ref([]);
                const layout = ref({});
                const adminTab = ref('product');
                const user = ref(null);
                const loginForm = ref({ email: '', password: '', captcha: '' });
                const generatedCode = ref('');
                const locations = ref({});
                
                const form = ref({ name: '', price: '', tags: '', height: '', weight: '', cup: '', imagesText: '', details: '', isTop: false, isFull: false, city: '', district: '' });
                const layoutForm = ref({ bannersText: '', announcement: '', locationsSimple: '' });
                const isEditing = ref(false);
                const editingId = ref(null);

                const generateCaptcha = () => {
                    const canvas = document.getElementById('captchaCanvas');
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, 120, 50);
                    ctx.fillStyle = '#222';
                    ctx.fillRect(0, 0, 120, 50);
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; 
                    let code = '';
                    for (let i = 0; i < 4; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
                    generatedCode.value = code;
                    ctx.font = 'bold 30px Arial';
                    ctx.textBaseline = 'middle';
                    for (let i = 0; i < 4; i++) {
                        ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 70%)`; 
                        ctx.save(); ctx.translate(20 + i * 25, 25); ctx.rotate((Math.random() - 0.5) * 0.4); 
                        ctx.fillText(code[i], 0, 0); ctx.restore();
                    }
                };

                onMounted(() => {
                    onAuthStateChanged(auth, (currentUser) => {
                        user.value = currentUser;
                        if (!currentUser) nextTick(() => generateCaptcha());
                    });
                    onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snapshot) => {
                        products.value = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    });
                    fetchLayoutSettings();
                });

                const login = async () => {
                    if (loginForm.value.captcha.toUpperCase() !== generatedCode.value) {
                        alert("❌ 驗證碼錯誤"); generateCaptcha(); return;
                    }
                    try {
                        await setPersistence(auth, browserSessionPersistence);
                        await signInWithEmailAndPassword(auth, loginForm.value.email, loginForm.value.password);
                    } catch (error) { alert("登入失敗"); generateCaptcha(); }
                };

                const logout = async () => { await signOut(auth); cancelEdit(); };
                
                const fetchLayoutSettings = async () => {
                    try {
                        const docSnap = await getDoc(doc(db, "settings", "global"));
                        if (docSnap.exists()) {
                            layout.value = docSnap.data();
                            layoutForm.value.announcement = layout.value.announcement || '';
                            layoutForm.value.bannersText = (layout.value.banners || []).join('\n');
                            locations.value = layout.value.locations || {};
                            
                            // 將 JSON 轉回 簡單清單格式 顯示在文字框內
                            let simpleList = [];
                            for (let city in locations.value) {
                                locations.value[city].forEach(dist => {
                                    simpleList.push(`${city}-${dist}`);
                                });
                            }
                            layoutForm.value.locationsSimple = simpleList.join('\n');
                        }
                    } catch (e) {}
                };

                const saveLayoutSettings = async () => {
                    try {
                        // 將 簡單清單 (縣市-區域) 轉回 JSON 物件
                        const lines = layoutForm.value.locationsSimple.split('\n').filter(l => l.trim().includes('-'));
                        const newLocations = {};
                        lines.forEach(line => {
                            const [city, dist] = line.split('-').map(s => s.trim());
                            if (city && dist) {
                                if (!newLocations[city]) newLocations[city] = [];
                                if (!newLocations[city].includes(dist)) newLocations[city].push(dist);
                            }
                        });

                        await setDoc(doc(db, "settings", "global"), { 
                            announcement: layoutForm.value.announcement, 
                            banners: layoutForm.value.bannersText.split('\n').filter(l => l.trim()),
                            locations: newLocations
                        });
                        locations.value = newLocations;
                        alert("佈置設定儲存成功！");
                    } catch (e) { alert("儲存失敗，請檢查格式是否正確"); }
                };

                const ensureArray = (imgs) => Array.isArray(imgs) ? imgs : (imgs ? [imgs] : ['https://placehold.co/600x800']);
                
                const openEdit = (item) => {
                    isEditing.value = true;
                    editingId.value = item.id;
                    form.value = { ...item, imagesText: ensureArray(item.images).join('\n') };
                };

                const cancelEdit = () => {
                    isEditing.value = false; editingId.value = null;
                    form.value = { name: '', price: '', tags: '', height: '', weight: '', cup: '', imagesText: '', details: '', isTop: false, isFull: false, city: '', district: '' };
                };

                const saveProduct = async () => {
                    const productData = { ...form.value, images: form.value.imagesText.split('\n').filter(l => l.trim()) };
                    delete productData.imagesText;
                    try {
                        if (isEditing.value) await updateDoc(doc(db, "products", editingId.value), productData);
                        else await addDoc(collection(db, "products"), { ...productData, createdAt: new Date().toISOString() });
                        alert("商品操作成功！"); cancelEdit();
                    } catch (e) { alert("失敗"); }
                };

                const deleteProduct = async (id) => { if (confirm("確定刪除？")) await deleteDoc(doc(db, "products", id)); };

                return { products, layout, adminTab, form, layoutForm, ensureArray, saveProduct, deleteProduct, saveLayoutSettings, user, loginForm, login, logout, generateCaptcha, openEdit, cancelEdit, isEditing, locations };
            }
        }).mount('#app');
    </script>
</body>
</html>
